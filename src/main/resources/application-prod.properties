# --- Production database: Postgres ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Let Hibernate update the schema automatically in dev/small deployments.
# For a stricter/safer production setup, consider switching to 'validate' or 'none'
# and managing schema changes with proper DB migrations (e.g. Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update    
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect