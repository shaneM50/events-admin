spring.application.name=events-admin-api

# --- Local/dev database: H2 in-memory ---
spring.datasource.url=jdbc:h2:mem:eventsadmin;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable "Open Session in View" so Hibernate sessions are not kept open across the web layer.
# This helps avoid hidden lazy-loading during controller/view rendering and makes transaction
# boundaries clearer (all DB access should happen in the service/repository layer).
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console